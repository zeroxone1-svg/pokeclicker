<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1a2e">
  <title>PokéClicker</title>
  <link rel="icon" type="image/png" href="assets/ui/favicon.png">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/ui/favicon.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="game-container"></div>
  <div id="boot-error" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#1a1a2e;color:#ff4444;font:14px Arial;padding:20px;z-index:9999;word-wrap:break-word;white-space:pre-wrap;"></div>

  <script>
    // Global error handler — catches import failures, CDN issues, etc.
    window.onerror = function(msg, src, line, col, err) {
      var el = document.getElementById('boot-error');
      if (el) { el.style.display = 'block'; el.textContent += 'ERROR: ' + msg + '\n' + (src||'') + ':' + line + '\n'; }
    };
    window.addEventListener('unhandledrejection', function(e) {
      var el = document.getElementById('boot-error');
      if (el) { el.style.display = 'block'; el.textContent += 'PROMISE ERROR: ' + (e.reason && e.reason.message || e.reason) + '\n'; }
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tone@14.7.77/build/Tone.min.js"></script>
  <script type="module" src="js/game.js"></script>
</body>
</html>
