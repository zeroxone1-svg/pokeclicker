  <rect x="12" y="30" width="40" height="28" rx="0" ry="0" fill="#D32F2F"/>
  <rect x="12" y="52" width="40" height="6" rx="0" ry="6" fill="#D32F2F" stroke="#B71C1C" stroke-width="2"/>
  <!-- Hinge line -->
  <line x1="12" y1="31" x2="52" y2="31" stroke="#B71C1C" stroke-width="2"/>
  <!-- Screen -->
  <rect x="18" y="12" width="28" height="16" rx="3" ry="3" fill="#81D4FA" stroke="#0288D1" stroke-width="1.5"/>
