<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- Crossed swords - battle/kills icon -->
  <!-- Sword 1 (left to right diagonal) -->
  <g transform="rotate(-45, 32, 32)">
    <!-- Blade -->
    <rect x="29" y="4" width="6" height="36" rx="2" fill="#B0BEC5" stroke="#78909C" stroke-width="1"/>
    <!-- Blade shine -->
    <rect x="30" y="6" width="2" height="30" rx="1" fill="#ECEFF1" opacity="0.7"/>
    <!-- Guard -->
    <rect x="22" y="38" width="20" height="5" rx="2.5" fill="#FFD54F" stroke="#F9A825" stroke-width="1"/>
    <!-- Handle -->
    <rect x="29" y="43" width="6" height="12" rx="2" fill="#5D4037" stroke="#3E2723" stroke-width="1"/>
    <!-- Pommel -->
    <circle cx="32" cy="57" r="3.5" fill="#FFD54F" stroke="#F9A825" stroke-width="1"/>
  </g>
  <!-- Sword 2 (right to left diagonal) -->
  <g transform="rotate(45, 32, 32)">
    <!-- Blade -->
    <rect x="29" y="4" width="6" height="36" rx="2" fill="#B0BEC5" stroke="#78909C" stroke-width="1"/>
    <!-- Blade shine -->
    <rect x="30" y="6" width="2" height="30" rx="1" fill="#ECEFF1" opacity="0.7"/>
    <!-- Guard -->
    <rect x="22" y="38" width="20" height="5" rx="2.5" fill="#FFD54F" stroke="#F9A825" stroke-width="1"/>
    <!-- Handle -->
    <rect x="29" y="43" width="6" height="12" rx="2" fill="#5D4037" stroke="#3E2723" stroke-width="1"/>
    <!-- Pommel -->
    <circle cx="32" cy="57" r="3.5" fill="#FFD54F" stroke="#F9A825" stroke-width="1"/>
  </g>
  <!-- Center spark -->
  <circle cx="32" cy="22" r="3" fill="#FFF176" opacity="0.8"/>
</svg>