  <!-- Top half (red) -->
  <path d="M 4 32 A 28 28 0 0 1 60 32 Z" fill="#E53935" stroke="#424242" stroke-width="3"/>
  <!-- Center band -->
  <rect x="4" y="29" width="56" height="6" fill="#424242"/>
  <!-- Center button outer -->
  <circle cx="32" cy="32" r="9" fill="#F5F5F5" stroke="#424242" stroke-width="3"/>
  <!-- Center button inner -->
  <circle cx="32" cy="32" r="5" fill="#FFFFFF" stroke="#616161" stroke-width="2"/>
  <!-- Shine highlight -->
